apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: ssh-gateway
  namespace: kgateway-system
spec:
  gatewayClassName: kgateway
  allowedListeners:
    namespaces:
      from: Same
  listeners:
    - name: dummy
      port: 9999
      protocol: TCP
      allowedRoutes:
        namespaces:
          from: All
---
